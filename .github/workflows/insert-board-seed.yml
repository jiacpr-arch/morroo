name: Insert Board Seed Questions

on:
  workflow_dispatch:
    inputs:
      only_specialty:
        description: "Comma-separated specialty slugs (e.g. orthopedics,internal_medicine). Empty = all."
        required: false
        default: ""
        type: string
      min_skip_at:
        description: "Skip a specialty if existing count ≥ this (safety brake). Scenario-level dedup runs regardless."
        required: false
        default: "250"
        type: string
      dry_run:
        description: "Parse + report only, no insert."
        required: false
        default: false
        type: boolean

jobs:
  insert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Insert board seed questions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONLY_SPECIALTY: ${{ inputs.only_specialty }}
          MIN_SKIP_AT: ${{ inputs.min_skip_at }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: npx tsx scripts/insert-board-seed.ts
