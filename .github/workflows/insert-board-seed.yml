name: Insert Board Seed (JSON → Supabase)

on:
  workflow_dispatch:
    inputs:
      only_specialty:
        description: "Comma-separated specialty slugs (e.g. psychiatry,internal_medicine). Empty = all files."
        required: false
        default: ""
      min_skip_at:
        description: "Skip a specialty entirely if existing review/active count ≥ this."
        required: false
        default: "200"
      dry_run:
        description: "Parse + report only (no DB writes)."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  insert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Insert board seed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONLY_SPECIALTY: ${{ inputs.only_specialty }}
          MIN_SKIP_AT: ${{ inputs.min_skip_at }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
        run: npx tsx scripts/insert-board-seed.ts
