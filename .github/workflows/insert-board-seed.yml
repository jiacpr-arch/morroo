name: Insert Board MCQ Seed Data

on:
  workflow_dispatch:
    inputs:
      only_specialty:
        description: "Comma-separated specialty slugs to limit to (blank = all)"
        required: false
        default: ""
        type: string
      min_skip_at:
        description: "Skip a specialty's file if existing count ≥ this (set high to rely on scenario-level dedup)"
        required: false
        default: "500"
        type: string
      dry_run:
        description: "Parse + report only — no DB writes"
        required: false
        default: true
        type: boolean

jobs:
  insert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Insert board seed data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONLY_SPECIALTY: ${{ inputs.only_specialty }}
          MIN_SKIP_AT: ${{ inputs.min_skip_at }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: npx tsx scripts/insert-board-seed.ts
