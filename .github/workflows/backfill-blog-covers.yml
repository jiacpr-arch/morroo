name: Backfill Blog Covers

# One-shot manual workflow to regenerate cover images for blog posts whose
# cover_image is missing or pointing outside our Supabase Storage bucket
# (e.g. expired Together AI signed URLs).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max rows to process (blank = no limit)"
        required: false
        default: ""
      force:
        description: "Regenerate even rows already on Supabase Storage"
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Backfill blog covers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit }}
          FORCE: ${{ github.event.inputs.force }}
        run: node scripts/backfill-blog-covers.mjs
