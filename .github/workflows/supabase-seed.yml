name: Auto-run SQL seeds on Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/longcase_seed_*.sql'
      - 'supabase/seed_*.sql'

jobs:
  run-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new/changed SQL files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'supabase/longcase_seed_*.sql' 'supabase/seed_*.sql')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Run SQL on Supabase
        if: steps.changed.outputs.has_files == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Installing psql..."
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null 2>&1

          echo "=== SQL files to run ==="
          echo "${{ steps.changed.outputs.files }}"
          echo "========================"

          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "Running: $file"
              psql "$SUPABASE_DB_URL" -f "$file"
              echo "Done: $file"
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          echo "All SQL seeds applied successfully!"
